<script>
const DATA = __DATA__;
const $ = (s, el) => (el || document).querySelector(s);

/* ---------------- option state ---------------- */

const OPTIONS = {
  basis: {
    label: "All-time-high basis",
    help: "The rules say “all-time high” but not whether it means the highest close or the highest intraday price. Intraday triggers more easily.",
    values: [
      { val: "close", t: "End-of-day", d: "Closing price vs. highest close" },
      { val: "intraday", t: "Intraday", d: "Day's low vs. highest intraday high" },
    ],
  },
  h100index: {
    label: "H100 index tier",
    help: "SiliconData publishes two H100 indices; the rules don't say which. Neocloud (SDH100RT) is the spot-like marketplace tier (~$2); Hyperscaler is the reserved/committed tier (~3× higher, ~$7.5). The $1.00 trigger only makes sense against neocloud. Affects the H100 condition only.",
    values: [
      { val: "neocloud", t: "Neocloud (SDH100RT)", d: "Spot-like marketplace tier · live Vast.ai proxy" },
      { val: "hyperscaler", t: "Hyperscaler", d: "Reserved/committed tier · ~3× pricier · published only" },
    ],
  },
};
// window is fixed to the clarified rolling-90-day rule (no longer a toggle).
const state = { range: "1y", basis: "close", window: "trailing", h100index: "neocloud" };
const OPT_TEXT = {
  basis: { close: "End-of-day ATH", intraday: "Intraday ATH" },
  h100index: { neocloud: "Neocloud", hyperscaler: "Hyperscaler" },
};

/* ---------------- date axis helpers ---------------- */

const AX = DATA.dateAxis;
const AXT = AX.map(s => Date.parse(s + "T00:00:00Z"));
const N = AX.length;
const LAST = N - 1;
const DISP = DATA.displayStart;
const WINMS = DATA.windowDays * 86400000;
const strToArr = s => Uint8Array.from(s, c => c === "1" ? 1 : 0);

// Visible x-window: the date-range chips on the page, always ending today.
// All charts share it. "all" shows everything from the chart start.
const RANGES = [
  { val: "3m", t: "3 Months", days: 92 },
  { val: "1y", t: "1 Year", days: 365 },
  { val: "all", t: "All", days: null },
];
let SLICE = DISP;
function sliceStart() {
  const cfg = RANGES.find(r => r.val === state.range);
  if (!cfg || cfg.days == null) return DISP;
  const cutoff = AXT[LAST] - cfg.days * 86400000;
  let i = 0;
  while (i < LAST && AXT[i] < cutoff) i++;
  return Math.max(i, DISP);
}
const daysBetween = (a, b) => Math.round((Date.parse(b + "T00:00:00Z") - Date.parse(a + "T00:00:00Z")) / 86400000);

function trailingArr(inst) {
  const out = new Uint8Array(N);
  let ones = 0, lo = 0;
  for (let i = 0; i < N; i++) {
    ones += inst[i];
    while (AXT[lo] < AXT[i] - WINMS) { ones -= inst[lo]; lo++; }
    out[i] = ones > 0 ? 1 : 0;
  }
  return out;
}
/* ---------------- tree evaluation (reactive) ---------------- */

function evalNode(node) {
  if (node.type === "manual")
    return { key: node.key, node, inst: null, met: null };

  if (node.type === "drawdown") {
    const inst = strToArr(node.bases[state.basis].inst);
    const met = state.window === "instant" ? inst : trailingArr(inst);
    return { key: node.key, node, inst, met };
  }

  if (node.type === "rental") {
    const tier = node.tiers[state.h100index] || node.tiers[node.defaultTier];
    const inst = strToArr(tier.inst);   // "<=$1 for 5 days" met, master-aligned
    const met = state.window === "instant" ? inst : trailingArr(inst);
    return { key: node.key, node, tier, inst, met };
  }

  if (node.type === "docket") {
    const inst = strToArr(node.inst);   // confirmed-bankruptcy state, master-aligned
    const met = state.window === "instant" ? inst : trailingArr(inst);
    return { key: node.key, node, inst, met };
  }

  // count
  const kids = node.children.map(evalNode);
  const withData = kids.filter(k => k.met);
  if (!withData.length)  // no resolvable children -> the parent is unknown too
    return { key: node.key, node, inst: null, met: null, kids,
             total: node.children.length, unknown: node.children.length };
  const count = new Int16Array(N), countInst = new Int16Array(N);
  for (const k of withData)
    for (let i = 0; i < N; i++) { count[i] += k.met[i]; countInst[i] += k.inst[i]; }
  const met = new Uint8Array(N), inst = new Uint8Array(N);
  for (let i = 0; i < N; i++) {
    met[i] = count[i] >= node.minMet ? 1 : 0;
    inst[i] = countInst[i] >= node.minMet ? 1 : 0;
  }
  return {
    key: node.key, node, inst, met, kids, count, countInst,
    total: node.children.length, unknown: node.children.length - withData.length,
  };
}

let RESULTS = {};
function indexResults(res) { RESULTS[res.key] = res; (res.kids || []).forEach(indexResults); }
function computeAll() { RESULTS = {}; indexResults(evalNode(DATA.tree)); }

function statusOf(res) {
  if (!res.met) return "unknown";
  return res.met[LAST] ? "met" : "not_met";
}
function dotOf(res) {
  if (!res.inst) return "unknown";
  if (res.inst[LAST]) return "met_solid";
  if (res.met[LAST]) return "met_hollow";
  return "not_met";
}
function lastMetOf(res) {
  if (res.node.type === "drawdown") return res.node.lastInst[state.basis];
  if (res.node.type === "rental") return res.tier.lastMet;
  if (res.node.type === "docket") return res.node.confirmed || null;
  if (!res.met) return null;
  for (let i = LAST; i >= 0; i--) if (res.met[i]) return AX[i];
  return null;
}

document.getElementById("subtitle").innerHTML = (DATA.note ? DATA.note + " " : "") +

document.getElementById("topsub").textContent = "Last update: " + (DATA.updated || "never") + " UTC";

// A node "has an automated data source" if any leaf under it is data-driven.
// Structural (toggle-independent), so the ordering is stable across options.
function hasData(node) {
  if (node.type === "drawdown" || node.type === "rental" || node.type === "docket") return true;
  if (node.type === "manual") return false;
  return (node.children || []).some(hasData);
}
// Children in display order: data-backed first, no-data last, original order
// preserved within each group (Array.sort is stable). Used by BOTH the main
// area and the sidebar so they always match.
function orderedChildren(node) {
  return (node.children || []).slice().sort((a, b) => (hasData(a) ? 0 : 1) - (hasData(b) ? 0 : 1));
}

const fmt$ = v => v == null ? "–" : v >= 100 ? v.toFixed(0) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
const pct = v => (v > 0 ? "+" : "") + (v * 100).toFixed(1) + "%";

function metaHtml(res) {
  const node = res.node;
  if (node.type === "drawdown") {
    const px = node.px[LAST], ath = node.bases[state.basis].ath[LAST], trig = node.bases[state.basis].trigger[LAST];
    const dd = 1 - px / ath;
    const last = node.lastInst[state.basis];
    let sticky = "";
    if (state.window === "trailing" && res.met[LAST] && !res.inst[LAST] && last) {
      const rem = DATA.windowDays - daysBetween(last, AX[LAST]);
      sticky = ` &middot; <span style="color:var(--met)">counts for ${rem} more day${rem === 1 ? "" : "s"}</span> (last breached ${last})`;
    }
    return `<b>${node.ticker}</b> close <b>$${fmt$(px)}</b> (${node.px[LAST] != null ? AX[LAST] : "–"}) &middot; ` +
      `ATH $${fmt$(ath)} &middot; drawdown <b>${(dd * 100).toFixed(1)}%</b> &middot; ` +
      `trigger at $${fmt$(trig)} &middot; last breached: <b>${last || "never"}</b>${sticky}`;
  }
  if (node.type === "count") {
    if (!res.met)
      return `All ${res.total} sub-conditions await a data source &middot; met when any ${node.minMet} resolve.`;
    return `<b>${res.count[LAST]} of ${res.total}</b> sub-conditions met (needs ${node.minMet})` +
      (res.unknown ? ` &middot; ${res.unknown} with no data yet` : "") +
      ` &middot; last met: <b>${lastMetOf(res) || "never"}</b>`;
  }
  if (node.type === "rental") {
    const t = res.tier;
    const tierName = state.h100index === "neocloud" ? "Neocloud SDH100RT" : "Hyperscaler";
    const src = t.source === "vast_proxy" ? "Vast.ai on-demand median (proxy)" : "SiliconData (published)";
    return `<b>${tierName}</b> &middot; ${src} <b>$${t.current.toFixed(2)}/hr</b> (${t.currentDate}) &middot; ` +
      `trigger: &le; $${node.threshold.toFixed(2)}/hr for ${node.days} straight days &middot; ` +
      `last at/below: <b>${t.lastMet || "never"}</b> &middot; ` +
      `<span style="color:var(--muted2)">approximation — authoritative index is SiliconData's paywalled feed</span>`;
  }
  if (node.type === "docket") {
    const cand = node.candidates;
    const candTxt = cand > 0
      ? `<b style="color:var(--met)">${cand} candidate filing${cand === 1 ? "" : "s"} — pending human review</b>`
      : `<b>0</b> candidate filings`;
    const b = node.currentBuzz;
    const bTxt = b != null ? `buzz coefficient <b>${b.toFixed(2)}</b> (${buzzTier(b)}) &middot; ` : "";
    return `${bTxt}daily GDELT news scan + federal Ch.7/11 docket scan for <b>${node.entity}</b> &middot; ` +
      `${candTxt} &middot; confirmed: <b>${node.confirmed || "none"}</b> &middot; last checked <b>${node.lastChecked}</b> &middot; ` +
      `<span style="color:var(--muted2)">buzz is context only — the condition needs a docket plus human confirmation</span>`;
  }
  return "No automated data source yet &middot; tracked manually until Phase 3.";
}

function nodeCard(node, depth, parentLabel) {
  const res = RESULTS[node.key];
  const sec = document.createElement("section");
  sec.className = "chartcard";
  sec.id = "card-" + node.key;

  const st = statusOf(res);
  const chip = `<span class="chip ${st}">${st === "met" ? "MET" : st === "not_met" ? "NOT MET" : "NO DATA"}</span>`;
  const tag = depth === 0 ? "contract" : "part of: " + parentLabel;
  const h = document.createElement("h2");
  h.innerHTML = `${node.label} ${chip} <span class="depthtag">${tag}</span>`;
  sec.appendChild(h);
  if (res.met) sec.insertAdjacentHTML("beforeend", optChips(node));

  const meta = document.createElement("div");
  meta.className = "meta";

  sec.appendChild(meta);

  if (node.type === "manual" || !res.met) {
    const d = document.createElement("div");

      ? "This condition resolves from its sub-conditions, none of which have a data feed yet."
      : "No data feed connected. Planned: court-docket + news monitoring (Phase 3), GPU rental price feed (Phase 4).";
    sec.appendChild(d);
  } else {
    const c = chartCanvas(sec);
    requestAnimationFrame(() => node.type === "drawdown" ? drawPrice(c, res)
      : node.type === "rental" ? drawRental(c, res)
      : node.type === "docket" ? drawDocket(c, res) : drawCount(c, res));
    sec.appendChild(chartLegend(node));
    if (node.type === "docket" && (node.events || []).length) {
      // numbered badge → news item (same visual language as the S&P legend)
      c.parentElement.addEventListener("click", ev => {
        const r = c.getBoundingClientRect();
        const mx = ev.clientX - r.left, my = ev.clientY - r.top;
        const hit = (node._badges || []).find(b => (mx - b.x) ** 2 + (my - b.y) ** 2 <= b.r ** 2);
        if (hit) window.open(hit.url, "_blank", "noopener");
      });
      const leg = document.createElement("ol");
      leg.className = "evlegend";
      leg.innerHTML = node.events.map((e, k) => {
        const d = new Date(e.date + "T00:00:00Z");

      }).join("");
      sec.appendChild(leg);
    }
  }
  return sec;
}

function renderCards() {
  const grid = $("#cardgrid");
  grid.innerHTML = "";
  XHAIRS = [];   // overlays are recreated with the cards
  // 1) Polymarket, 2) S&P 500 context, 3) the root contract — always first.
  if (DATA.market) grid.appendChild(marketCard());
  if (DATA.sp500) grid.appendChild(sp500Card());
  const flat = [];
  (function walk(node, depth, parentLabel) {
    flat.push({ node, depth, parentLabel });
    orderedChildren(node).forEach(c => walk(c, depth + 1, node.label));
  })(DATA.tree, 0, null);
  const root = flat.shift();
  grid.appendChild(nodeCard(root.node, root.depth, root.parentLabel));
  // 3) met / met-trailing conditions first (drama above the fold), otherwise
  //    normal tree order (stable sort preserves it). Sidebar tree is untouched.
  flat.sort((a, b) => metRank(a.node) - metRank(b.node));
  flat.forEach(e => grid.appendChild(nodeCard(e.node, e.depth, e.parentLabel)));
}

/* ---------------- canvas ---------------- */

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  return { ctx, w, h };
}

/* Synchronized crosshair: hovering any chart draws a vertical line + date on
   EVERY chart at the same date (all charts share the master axis + SLICE). */
let XHAIRS = [];   // overlay canvases, rebuilt with the cards

function chartCanvas(sec) {
  const wrap = document.createElement("div");
  wrap.className = "chartwrap";
  const c = document.createElement("canvas");
  const o = document.createElement("canvas");
  o.className = "xhair";
  wrap.appendChild(c); wrap.appendChild(o);
  sec.appendChild(wrap);
  XHAIRS.push(o);
  wrap.addEventListener("mousemove", ev => {
    const r = wrap.getBoundingClientRect();
    const n = N - SLICE;
    const frac = (ev.clientX - r.left - PAD.l) / (r.width - PAD.l - PAD.r);
    const i = Math.max(0, Math.min(n - 1, Math.round(frac * (n - 1))));
    drawHover(i);
  });
  wrap.addEventListener("mouseleave", clearHover);
  return c;
}

function drawHover(i) {
  const dateStr = AX[SLICE + i];
  const n = N - SLICE;
  XHAIRS.forEach(o => {
    const dpr = window.devicePixelRatio || 1;
    const w = o.clientWidth, h = o.clientHeight;
    if (o.width !== Math.round(w * dpr)) { o.width = Math.round(w * dpr); o.height = Math.round(h * dpr); }
    const x2 = o.getContext("2d");
    x2.setTransform(dpr, 0, 0, dpr, 0, 0);
    x2.clearRect(0, 0, w, h);
    const px = xScale(i, n, w);
    x2.strokeStyle = "rgba(244,244,246,.35)"; x2.lineWidth = 1;
    x2.beginPath(); x2.moveTo(px, PAD.t); x2.lineTo(px, h - PAD.b); x2.stroke();
    x2.font = "10.5px 'Geist Mono', Consolas, monospace";
    const tw = x2.measureText(dateStr).width + 12;
    const bx = (px + 8 + tw > w - PAD.r) ? px - tw - 8 : px + 8;
    x2.fillStyle = "#242b32";
    x2.beginPath(); x2.roundRect(bx, PAD.t, tw, 17, 4); x2.fill();
    x2.strokeStyle = "#3a4453"; x2.stroke();
    x2.fillStyle = "#f4f4f6"; x2.textAlign = "left"; x2.textBaseline = "middle";
    x2.fillText(dateStr, bx + 6, PAD.t + 9);
    x2.textBaseline = "alphabetic";
  });
}

function clearHover() {
  XHAIRS.forEach(o => {
    const x2 = o.getContext("2d");
    x2.setTransform(1, 0, 0, 1, 0, 0);
    x2.clearRect(0, 0, o.width, o.height);
  });
}
const PAD = { l: 52, r: 12, t: 10, b: 22 };
function xScale(i, n, w) { return PAD.l + (w - PAD.l - PAD.r) * (n <= 1 ? 0 : i / (n - 1)); }

function niceTicks(min, max, count) {
  const span = max - min || 1, step0 = span / count;
  const mag = Math.pow(10, Math.floor(Math.log10(step0)));
  const step = [1, 2, 2.5, 5, 10].map(m => m * mag).find(s => span / s <= count) || 10 * mag;
  const ticks = [];
  for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) ticks.push(v);
  return ticks;
}

function drawFrame(ctx, w, h, dates, yMin, yMax, yFmt) {
  const css = getComputedStyle(document.documentElement);
  ctx.clearRect(0, 0, w, h);
  ctx.font = "10.5px 'Segoe UI', sans-serif";
  const y2px = v => PAD.t + (h - PAD.t - PAD.b) * (1 - (v - yMin) / (yMax - yMin || 1));
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  for (const t of niceTicks(yMin, yMax, 5)) {
    const y = y2px(t);
    ctx.strokeStyle = css.getPropertyValue("--border"); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(w - PAD.r, y); ctx.stroke();
    ctx.fillStyle = css.getPropertyValue("--muted"); ctx.fillText(yFmt(t), PAD.l - 7, y);
  }
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  let lastYear = "";
  dates.forEach((d, i) => {
    const yr = d.slice(0, 4);
    if (yr !== lastYear) {
      lastYear = yr;
      const x = xScale(i, dates.length, w);
      ctx.strokeStyle = css.getPropertyValue("--border");
      ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, h - PAD.b); ctx.stroke();
      ctx.fillStyle = css.getPropertyValue("--muted"); ctx.fillText(yr, x, h - PAD.b + 6);
    }
  });
  return y2px;
}

function shade(ctx, w, h, flags, n, color) {
  ctx.fillStyle = color;
  let start = null;
  for (let i = 0; i <= n; i++) {
    const on = i < n && flags[i];
    if (on && start === null) start = i;
    if (!on && start !== null) {
      const x0 = xScale(start, n, w), x1 = xScale(Math.max(i - 1, start), n, w);
      ctx.fillRect(x0, PAD.t, Math.max(x1 - x0, 1.5), h - PAD.t - PAD.b);
      start = null;
    }
  }
}

function polyline(ctx, arr, n, w, y2px, color, width, dash) {
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash || []);
  ctx.beginPath();
  let pen = false;
  arr.forEach((v, i) => {
    if (v == null) { pen = false; return; }
    const x = xScale(i, n, w), y = y2px(v);
    pen ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    pen = true;
  });
  ctx.stroke(); ctx.setLineDash([]);
}

function stepline(ctx, arr, n, w, y2px, color, width) {
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.beginPath();
  arr.forEach((v, i) => {
    const x = xScale(i, n, w), y = y2px(v);
    if (i === 0) ctx.moveTo(x, y);
    else { ctx.lineTo(x, y2px(arr[i - 1])); ctx.lineTo(x, y); }
  });
  ctx.stroke();
}

function drawPrice(canvas, res) {
  const node = res.node;
  const { ctx, w, h } = setupCanvas(canvas);
  const dates = AX.slice(SLICE);
  const close = node.px.slice(SLICE);
  const ath = node.bases[state.basis].ath.slice(SLICE);
  const trig = node.bases[state.basis].trigger.slice(SLICE);
  const inst = Array.from(res.inst).slice(SLICE);
  const met = Array.from(res.met).slice(SLICE);
  const n = dates.length;
  const nums = close.concat(ath, trig).filter(v => v != null);
  if (!nums.length) return;
  const yMin = Math.min(...nums) * 0.95, yMax = Math.max(...nums) * 1.03;
  const y2px = drawFrame(ctx, w, h, dates, yMin, yMax, v => "$" + fmt$(v));
  if (state.window === "trailing")
    shade(ctx, w, h, met.map((m, i) => m && !inst[i] ? 1 : 0), n, "rgba(244,52,55,.12)");
  shade(ctx, w, h, inst, n, "rgba(244,52,55,.24)");
  const css = getComputedStyle(document.documentElement);
  polyline(ctx, ath, n, w, y2px, css.getPropertyValue("--ath"), 1.2, [5, 4]);
  polyline(ctx, trig, n, w, y2px, css.getPropertyValue("--trigger"), 1.2, [2, 3]);
  polyline(ctx, close, n, w, y2px, css.getPropertyValue("--price"), 1.6);
}

function drawCount(canvas, res) {
  const node = res.node;
  const { ctx, w, h } = setupCanvas(canvas);
  const dates = AX.slice(SLICE);
  const count = Array.from(res.count).slice(SLICE);
  const countInst = Array.from(res.countInst).slice(SLICE);
  const met = Array.from(res.met).slice(SLICE);
  const n = dates.length;
  const yMax = Math.max(res.total, node.minMet) + 0.5;
  const y2px = drawFrame(ctx, w, h, dates, 0, yMax, v => Number.isInteger(v) ? String(v) : "");
  shade(ctx, w, h, met, n, "rgba(244,52,55,.18)");
  const css = getComputedStyle(document.documentElement);
  ctx.strokeStyle = css.getPropertyValue("--trigger"); ctx.lineWidth = 1.2; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(PAD.l, y2px(node.minMet)); ctx.lineTo(w - PAD.r, y2px(node.minMet)); ctx.stroke();
  ctx.setLineDash([]);
  // faint "instant" count for contrast with the sticky/trailing count
  if (state.window === "trailing")
    stepline(ctx, countInst, n, w, y2px, css.getPropertyValue("--ath"), 1);
  stepline(ctx, count, n, w, y2px, css.getPropertyValue("--price"), 1.7);
}

function drawRental(canvas, res) {
  const node = res.node;
  const { ctx, w, h } = setupCanvas(canvas);
  // Aligned to the shared master axis; null (empty) before the first reading.
  const dates = AX.slice(SLICE);
  const vals = res.tier.values.slice(SLICE);
  const met = Array.from(res.met).slice(SLICE);
  const n = dates.length;
  const nums = vals.filter(v => v != null).concat([node.threshold]);
  if (!nums.length) return;
  const yMax = Math.max(...nums) * 1.15;
  const y2px = drawFrame(ctx, w, h, dates, 0, yMax, v => "$" + v.toFixed(2));
  shade(ctx, w, h, met, n, "rgba(244,52,55,.24)");
  const css = getComputedStyle(document.documentElement);
  ctx.strokeStyle = css.getPropertyValue("--trigger"); ctx.lineWidth = 1.2; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(PAD.l, y2px(node.threshold)); ctx.lineTo(w - PAD.r, y2px(node.threshold)); ctx.stroke();
  ctx.setLineDash([]);
  polyline(ctx, vals, n, w, y2px, css.getPropertyValue("--price"), 1.6);
}

function buzzTier(b) {
  if (b == null) return "–";
  if (b >= 1) return "CONFIRMED";
  if (b >= 0.9) return "docket found — pending review";
  if (b >= 0.7) return "heavy corroborated coverage";
  if (b >= 0.4) return "widespread distress narrative";
  if (b >= 0.1) return "elevated chatter";
  return "background noise";
}

function drawDocket(canvas, res) {
  const node = res.node;
  const { ctx, w, h } = setupCanvas(canvas);
  const dates = AX.slice(SLICE);
  const buzz = node.buzz.slice(SLICE);
  const met = Array.from(res.met).slice(SLICE);
  const n = dates.length;
  if (!buzz.some(v => v != null)) return;
  const y2px = drawFrame(ctx, w, h, dates, 0, 1.05, v => v.toFixed(2));
  shade(ctx, w, h, met, n, "rgba(244,52,55,.24)");
  const css = getComputedStyle(document.documentElement);
  // reference lines: 0.90 docket zone, 1.00 confirmed
  ctx.setLineDash([2, 3]); ctx.lineWidth = 1.2;
  ctx.strokeStyle = css.getPropertyValue("--ath");
  ctx.beginPath(); ctx.moveTo(PAD.l, y2px(0.9)); ctx.lineTo(w - PAD.r, y2px(0.9)); ctx.stroke();
  ctx.strokeStyle = css.getPropertyValue("--trigger");
  ctx.beginPath(); ctx.moveTo(PAD.l, y2px(1.0)); ctx.lineTo(w - PAD.r, y2px(1.0)); ctx.stroke();
  ctx.setLineDash([]);
  // notable-spike markers — same visual language as the S&P event badges,
  // with hit-rects recorded so badges are clickable (opens the news item).
  node._badges = [];
  const rowX = [-Infinity, -Infinity, -Infinity];
  (node.events || []).forEach((e, k) => {
    if (e.i < SLICE) return;
    const x = xScale(e.i - SLICE, n, w);
    let row = rowX.findIndex(rx => x - rx >= 18);
    if (row === -1) row = 0;
    rowX[row] = x;
    const by = PAD.t + 8 + row * 18;
    // events the classifier flagged as co-occurrence noise render muted grey
    const rel = e.related !== false;
    const mark = rel ? css.getPropertyValue("--accent") : "#5a6472";
    ctx.strokeStyle = "#3a4453"; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.moveTo(x, by + 10); ctx.lineTo(x, h - PAD.b); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = rel ? "#12202e" : "#1a1f26";
    ctx.beginPath(); ctx.arc(x, by, 8, 0, 6.2832); ctx.fill();
    ctx.strokeStyle = mark; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, by, 8, 0, 6.2832); ctx.stroke();
    ctx.fillStyle = mark;
    ctx.font = "700 9px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(String(k + 1), x, by + 0.5);
    ctx.textBaseline = "alphabetic";
    if (e.url && rel) node._badges.push({ x, y: by, r: 10, url: e.url });
  });
  polyline(ctx, buzz, n, w, y2px, css.getPropertyValue("--price"), 1.6);
}

function drawMarket(canvas, m) {
  const { ctx, w, h } = setupCanvas(canvas);
  const dates = AX.slice(SLICE);
  const prob = m.prob.slice(SLICE).map(v => v == null ? null : v * 100);
  const n = dates.length;
  const nums = prob.filter(v => v != null);
  if (!nums.length) return;
  const yMax = Math.min(100, Math.max(...nums) * 1.25);
  const y2px = drawFrame(ctx, w, h, dates, 0, Math.max(yMax, 5), v => v.toFixed(0) + "%");
  polyline(ctx, prob, n, w, y2px, getComputedStyle(document.documentElement).getPropertyValue("--price"), 1.8);
}

function drawSP500(canvas, s) {
  const { ctx, w, h } = setupCanvas(canvas);
  const dates = AX.slice(SLICE);
  const close = s.close.slice(SLICE);
  const n = dates.length;
  const nums = close.filter(v => v != null);
  if (!nums.length) return;
  const yMin = Math.min(...nums) * 0.97, yMax = Math.max(...nums) * 1.05;
  const y2px = drawFrame(ctx, w, h, dates, yMin, yMax, v => Math.round(v).toLocaleString());
  const css = getComputedStyle(document.documentElement);
  // event markers: dashed vertical line + numbered badge at the top.
  // Clustered badges cascade to lower rows (up to 3) so none overlap.
  const rowX = [-Infinity, -Infinity, -Infinity];
  s.events.forEach((e, k) => {
    if (e.i < SLICE) return;
    const x = xScale(e.i - SLICE, n, w);
    let row = rowX.findIndex(rx => x - rx >= 18);
    if (row === -1) row = 0;
    rowX[row] = x;
    const by = PAD.t + 8 + row * 18;
    ctx.strokeStyle = "#3a4453"; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
    ctx.beginPath(); ctx.moveTo(x, by + 10); ctx.lineTo(x, h - PAD.b); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#12202e";
    ctx.beginPath(); ctx.arc(x, by, 8, 0, 6.2832); ctx.fill();
    ctx.strokeStyle = css.getPropertyValue("--accent"); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, by, 8, 0, 6.2832); ctx.stroke();
    ctx.fillStyle = css.getPropertyValue("--accent");
    ctx.font = "700 9px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(String(k + 1), x, by + 0.5);
    ctx.textBaseline = "alphabetic";
  });
  polyline(ctx, close, n, w, y2px, css.getPropertyValue("--price"), 1.6);
}

/* ---------------- sidebar: options ---------------- */

function renderOptions() {
  const host = $("#options");
  host.innerHTML = "";
  for (const key of ["basis", "h100index"]) {
    const cfg = OPTIONS[key];
    const g = document.createElement("div");
    g.className = "optgroup";
    g.id = "og-" + key;
    g.innerHTML = `<div class="optlabel">${cfg.label}</div>`;
    const seg = document.createElement("div");
    seg.className = "seg";
    cfg.values.forEach(v => {
      const b = document.createElement("button");
      b.className = state[key] === v.val ? "active" : "";
      b.innerHTML = `<span class="t">${v.t}</span><span class="d">${v.d}</span>`;
      b.addEventListener("click", () => { if (state[key] !== v.val) { state[key] = v.val; rerender(); } });
      seg.appendChild(b);
    });
    g.appendChild(seg);
    g.insertAdjacentHTML("beforeend", `<div class="opthelp">${cfg.help}</div>`);
    host.appendChild(g);
  }
  host.insertAdjacentHTML("beforeend", `
    <div class="clarified">
      <div class="clarified-h">90-day window — clarified rule</div>
      The three qualifying events must fall within a <b>single 90-day window that ends no later than the
      Dec 31, 2026 deadline</b> (clarification added Nov 20, 2025). For example, crossings on Jan 10, Feb 5 and
      Mar 3, 2026 qualify (one 90-day span), but Jan 10, Apr 20 and Nov 1, 2026 do not (more than 90 days apart).
      The oracle uses this rolling-window rule; the earlier “must be simultaneous” reading is ruled out, so this
      is no longer a selectable option.
    </div>`);
}

/* ---------------- sidebar: condition tree ---------------- */

const collapsed = new Set();

function sidebarNode(node) {
  const res = RESULTS[node.key];
  const wrap = document.createElement("div");
  wrap.className = "snode";
  const row = document.createElement("div");
  row.className = "srow";
  const hasKids = (node.children || []).length > 0;

  const caret = document.createElement("span");
  caret.className = "caret" + (hasKids ? "" : " leafpad");
  caret.textContent = collapsed.has(node.key) ? "▶" : "▼";
  row.appendChild(caret);

  const dot = document.createElement("span");
  dot.className = "dot " + dotOf(res);
  row.appendChild(dot);

  const label = document.createElement("span");
  label.className = "slabel";
  label.textContent = node.label;
  label.title = node.label;
  row.appendChild(label);

  const lm = lastMetOf(res);
  const date = document.createElement("span");
  date.className = "sdate";
  date.innerHTML = `<span class="lbl">last met</span>${lm || (res.inst == null ? "no data" : "never")}`;
  row.appendChild(date);
  wrap.appendChild(row);

  if (hasKids) {
    const kids = document.createElement("div");
    kids.className = "schildren" + (collapsed.has(node.key) ? " collapsed" : "");
    orderedChildren(node).forEach(c => kids.appendChild(sidebarNode(c)));
    wrap.appendChild(kids);
    caret.addEventListener("click", e => {
      e.stopPropagation();
      const now = kids.classList.toggle("collapsed");
      caret.textContent = now ? "▶" : "▼";
      if (now) collapsed.add(node.key); else collapsed.delete(node.key);
    });
  }
  row.addEventListener("click", () => {
    const card = document.getElementById("card-" + node.key);
    card.scrollIntoView({ behavior: "smooth", block: "start" });
    card.classList.remove("flash");
    requestAnimationFrame(() => card.classList.add("flash"));
  });
  return wrap;
}

function marketSidebar() {
  const m = DATA.market;
  const wrap = document.createElement("div");
  wrap.className = "snode";
  const row = document.createElement("div");
  row.className = "srow";
  const cur = m.current != null ? (m.current * 100).toFixed(0) + "%" : "–";
  row.innerHTML = `<span class="caret leafpad"></span><span class="dot market"></span>` +
    `<span class="slabel">Market probability</span>` +
    `<span class="sdate"><span class="lbl">YES now</span>${cur}</span>`;
  row.addEventListener("click", () => {
    const card = document.getElementById("card-market_price");
    card.scrollIntoView({ behavior: "smooth", block: "start" });
    card.classList.remove("flash");
    requestAnimationFrame(() => card.classList.add("flash"));
  });
  wrap.appendChild(row);
  return wrap;
}

function sp500Sidebar() {
  const s = DATA.sp500;
  const wrap = document.createElement("div");
  wrap.className = "snode";
  const row = document.createElement("div");
  row.className = "srow";
  const cur = s.current != null ? Math.round(s.current).toLocaleString() : "–";
  row.innerHTML = `<span class="caret leafpad"></span><span class="dot market"></span>` +
    `<span class="slabel">S&amp;P 500 &amp; key events</span>` +
    `<span class="sdate"><span class="lbl">now</span>${cur}</span>`;
  row.addEventListener("click", () => {
    const card = document.getElementById("card-sp500");
    card.scrollIntoView({ behavior: "smooth", block: "start" });
    card.classList.remove("flash");
    requestAnimationFrame(() => card.classList.add("flash"));
  });
  wrap.appendChild(row);
  return wrap;
}

function renderSidebarTree() {
  const host = $("#tree");
  host.innerHTML = "";
  if (DATA.market) host.appendChild(marketSidebar());
  if (DATA.sp500) host.appendChild(sp500Sidebar());
  host.appendChild(sidebarNode(DATA.tree));
}

/* ---------------- "open questions" ambiguities callout ---------------- */

function ambiSeg(key, values) {
  return `<span class="ambiseg">${values.map(v =>
    `<button class="${state[key] === v.val ? "active" : ""}" data-ambi="${key}" data-val="${v.val}">${v.t}</button>`
  ).join("")}</span>`;
}

/* ---------------- plain-English verdict line ---------------- */

function renderVerdict() {
  const root = RESULTS[DATA.tree.key];
  const met = root && root.count ? root.count[LAST] : 0;
  const need = DATA.tree.minMet;
  const total = DATA.tree.children.length;
  const prob = DATA.market && DATA.market.current != null
    ? `The market prices a <b class="v-prob">${(DATA.market.current * 100).toFixed(0)}% chance</b>.` : "";
  $("#verdict").innerHTML =
    `Right now: <b class="v-met">${met} of ${total}</b> conditions met — ` +
    `<b>${need}</b> at once would resolve YES. ${prob}`;
}

// Collapsed by default — traders arriving via the #ambiguities deep link get
// it expanded; everyone else sees a one-line hint.
let ambiOpen = location.hash === "#ambiguities";

function renderAmbiguities() {
  const host = $("#ambiguities");
  host.innerHTML = `
    <div class="ambibox${ambiOpen ? "" : " collapsed"}" id="ambibox">
      <div class="ambihead" id="ambitoggle">
        <span class="ambicaret">${ambiOpen ? "▼" : "▶"}</span>
        &#9888;&#65039; Two rules the market doesn't pin down — and they can move the odds
        <span class="ambihint">${ambiOpen ? "collapse" : "expand"}</span>
      </div>
      <div class="ambibody">
        <div class="ambirow">
          <div class="ambiq"><b>“All-time high” — end-of-day close or intraday high?</b> Intraday highs sit higher, so a stock reaches its −50% mark sooner. Decisive for any condition hovering near its threshold.</div>
          ${ambiSeg("basis", [{ val: "close", t: "End-of-day" }, { val: "intraday", t: "Intraday" }])}
        </div>
        <div class="ambirow">
          <div class="ambiq"><b>Which SiliconData H100 index?</b> Neocloud (~$2/hr) vs. hyperscaler (~$7.5/hr). The $1.00 trigger is only realistically reachable against the neocloud tier.</div>
          ${ambiSeg("h100index", [{ val: "neocloud", t: "Neocloud" }, { val: "hyperscaler", t: "Hyperscaler" }])}
        </div>
        <div class="ambifoot">Neither is specified in the rules. Full breakdown on the <a href="datasources.html#src:yahoo">Data Sources</a> page.</div>
      </div>
    </div>`;
  $("#ambitoggle").onclick = () => { ambiOpen = !ambiOpen; renderAmbiguities(); };
  host.querySelectorAll("[data-ambi]").forEach(b => {
    b.onclick = () => {
      const k = b.getAttribute("data-ambi"), v = b.getAttribute("data-val");
      if (state[k] !== v) { state[k] = v; rerender(); }
    };
  });
}

/* ---------------- date-range chips (on the page, not the drawer) ---------- */

function renderRangeBar() {
  const host = $("#rangebar");
  host.innerHTML = "";
  RANGES.forEach(r => {
    const b = document.createElement("button");
    b.className = "rangechip" + (state.range === r.val ? " active" : "");
    b.textContent = r.t;
    b.onclick = () => {
      if (state.range === r.val) return;
      state.range = r.val;
      SLICE = sliceStart();
      renderRangeBar();
      const main = document.getElementById("charts");
      const y = main.scrollTop;
      renderCards();          // only the x-window changed; no need to recompute the tree
      main.scrollTop = y;
    };
    host.appendChild(b);
  });
}

/* ---------------- orchestration ---------------- */

function rerender() {
  const main = document.getElementById("charts");
  const y = main.scrollTop;
  SLICE = sliceStart();
  computeAll();
  renderVerdict();
  renderOptions();
  renderAmbiguities();
  renderRangeBar();
  renderCards();
  renderSidebarTree();
  main.scrollTop = y;
}
SLICE = sliceStart();
computeAll();
renderVerdict();
renderOptions();
renderAmbiguities();
renderRangeBar();
renderCards();
renderSidebarTree();

/* deep link: /dashboard.html#ambiguities highlights the callout */
if (location.hash === "#ambiguities") {
  requestAnimationFrame(() => {
    const box = document.getElementById("ambibox");
    if (box) { box.scrollIntoView({ block: "start" }); box.classList.add("flash"); }
  });
}

/* slide-out options drawer */
const drawer = document.getElementById("drawer");
const scrim = document.getElementById("drawer-scrim");
const closeDrawer = () => { drawer.classList.remove("open"); scrim.classList.remove("open"); };
function openDrawer(targetOpt) {
  drawer.classList.add("open"); scrim.classList.add("open");
  if (targetOpt) {
    const g = document.getElementById("og-" + targetOpt);
    if (g) {
      g.scrollIntoView({ block: "nearest" });
      g.classList.remove("pulse");
      void g.offsetWidth;   // restart the animation synchronously
      g.classList.add("pulse");
    }
  }
}
document.getElementById("opts-btn").onclick = () => openDrawer();
// clicking an option-backed chip on any card opens the drawer at that option
$("#cardgrid").addEventListener("click", e => {
  const c = e.target.closest(".optchip[data-opt]");
  if (c) openDrawer(c.getAttribute("data-opt"));
});
document.getElementById("drawer-close").onclick = closeDrawer;
scrim.onclick = closeDrawer;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(renderCards, 200);
});
</script>
