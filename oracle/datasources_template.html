<style>
  :root {
    --bg: #0a0d13; --panel: #12161f; --panel2: #1b212c; --border: #242c39; --border2: #313a49;
    --text: #eef1f6; --muted: #9aa4b3; --muted2: #6a7484; --accent: #1677ff; --accent-hi: #57a6ff;
    --notmet: #35c07a; --amber: #e0bf3e; --mart: #f0655e; --serve: #c4b5fd; --stg: #7af098; --load: #8ccefe;
    --font: Inter, "Open Sauce One", "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", "SF Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  /* App-shell: the page never scrolls; content + sidebar scroll in their own
     panes so their scrollbars are never adjacent. */
  body { background: var(--bg); color: var(--text); font: 14px/1.6 var(--font); overflow: hidden; }
  a { color: var(--accent); }
  /* subtle scrollbars */
  * { scrollbar-width: thin; scrollbar-color: #2c3646 transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2c3646; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4453; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  #topbar { display: flex; align-items: center; gap: 12px; padding: 0 24px; height: 56px;
    background: var(--bg); border-bottom: 1px solid var(--border); z-index: 10; }
  #topbar .mark { width: 26px; height: 26px; border-radius: 6px; background: var(--text); color: var(--bg);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; }
  #topbar .brand { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
  .topnav { display: flex; gap: 4px; margin-left: 18px; }
  .topnav a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 7px; }
  .topnav a:hover { color: var(--text); background: var(--panel2); }
  .topnav a.active { color: var(--text); background: var(--panel3); }
  #topbar .home { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  #topbar .sub { color: var(--muted); font-size: 12.5px; text-align: right; }
  #opts-btn { margin-left: auto; background: var(--panel); border: 1px solid var(--border); color: var(--text);
    font: inherit; font-size: 13px; padding: 6px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  #opts-btn:hover { background: var(--panel2); }

  #app { display: flex; height: calc(100vh - 56px); }
  main#scroll { flex: 1; min-width: 0; overflow-y: auto; }
  #detail { max-width: 900px; margin: 0 auto; padding: 26px 30px 80px; }

  /* right sidebar: source + asset navigation */
  aside { width: 340px; flex-shrink: 0; background: var(--bg); border-left: 1px solid var(--border);
    padding: 16px 10px; overflow-y: auto; }

  /* slide-out options drawer */
  #drawer-scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 20; }
  #drawer-scrim.open { opacity: 1; pointer-events: auto; }
  #drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 320px; max-width: 90vw; background: var(--bg);
    border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .22s ease; z-index: 21; overflow-y: auto; padding: 18px 14px; }
  #drawer.open { transform: translateX(0); }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .drawer-head span { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  #drawer-close { background: transparent; border: 0; color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; }

  aside h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin: 4px 10px 8px; }

  .navitem.active { background: var(--panel); }

  table.schema { width: 100%; border-collapse: collapse; font-size: 13px; }

  table.schema .col { font-family: var(--mono); font-size: 12.5px; font-weight: 600; }
  table.schema .typ { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
  table.schema .ex { font-family: var(--mono); font-size: 12px; color: var(--text); background: var(--panel2); border-radius: 5px; padding: 2px 7px; white-space: nowrap; }
  table.schema .note { font-size: 11.5px; color: var(--muted2); margin-top: 3px; }

  .kind.key { background: rgba(22,119,255,.15); color: var(--accent); }
  .kind.pass { background: rgba(128,131,142,.15); color: var(--muted); }
  .kind.cast { background: rgba(122,240,152,.14); color: var(--stg); }
  .kind.derived { background: rgba(224,191,62,.15); color: var(--amber); }
  .kind.seed { background: rgba(140,206,254,.15); color: var(--load); }

  ul.xforms li:last-child { border-bottom: 0; }
  .xf { font-family: var(--font); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    color: var(--accent); background: rgba(22,119,255,.10); padding: 2px 7px; border-radius: 100px; margin-right: 7px; }
  .macro { font-family: var(--mono); font-size: 12px; background: var(--panel2); color: var(--text); padding: 1px 6px; border-radius: 5px; border: 1px solid var(--border); }

  pre.sql { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;

  pre.sql .kw { color: #ff9fb0; } pre.sql .fn { color: var(--stg); } pre.sql .cm { color: var(--muted2); }

  .tests { display: flex; flex-wrap: wrap; gap: 7px; }

  code { font-family: var(--mono); background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }

  .gtext { fill: #e8ecf2; font-family: var(--mono); font-size: 11px; font-weight: 600; }

  .flowline .fnum { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--accent); }

  /* source overview: options / ambiguities / caveats */
  .infobox { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 2px 16px 8px; margin: 10px 0; }

  .infolist li:last-child { border-bottom: 0; }

  /* sidebar option toggles */
  .optpanel { margin: 20px 4px 8px; border-top: 1px solid var(--border); padding-top: 14px; }

  .optgroup2 { margin: 0 6px 12px; }
  .optlabel2 { font-size: 11.5px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .seg2 { display: flex; gap: 3px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .seg2 button { flex: 1; background: transparent; border: 0; color: var(--muted); font: inherit; font-size: 11.5px; padding: 6px 8px; border-radius: 6px; cursor: pointer; }
  .seg2 button:hover { color: var(--text); background: var(--panel2); }
  .seg2 button.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* option / ambiguity / caveat: distinguished by the label text, not colour */
  .tag2 { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; padding: 2px 7px; border-radius: 4px; margin-right: 8px; white-space: nowrap; color: var(--muted); background: var(--panel2); border: 1px solid var(--border); }
  .infolist li.opt { border-left: 2px solid var(--muted2); padding-left: 12px; }
  .infolist li.clr { border-left: 2px solid #35c07a; padding-left: 12px; }
  .infolist li.amb { border-left: 2px dashed var(--muted2); padding-left: 12px; }
  .infolist li.cav { border-left: 2px dotted var(--muted2); padding-left: 12px; }

  /* cardinality table */
  table.card2 { width: 100%; border-collapse: collapse; font-size: 12.5px; }

  table.card2 td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; color: #cdd3dd; }

  table.card2 .rc { font-family: var(--mono); color: var(--accent); white-space: nowrap; }

  /* --- mobile: stack the panes, the page scrolls normally --- */
  @media (max-width: 820px) {

    body { overflow-y: auto; }
    #app { flex-direction: column; height: auto; }

<script>
const DATA = __DATA__;
const E = DATA.example || {};
const E100 = (DATA.h100 && DATA.h100.neocloud) || {};   // neocloud tier for static asset examples
const H100_ROWS_ALL = (DATA.h100 && DATA.h100.rowsAll) || 8;
const E_PM = DATA.polymarket || {};
const E_BK = DATA.bankruptcy || {};
const TN = DATA.thennow || {};   // Then-and-Now engine example scalars
document.getElementById("topsub").textContent = "Last update: " + (DATA.updated || "never") + " UTC";

const money = v => "$" + (v >= 100 ? v.toFixed(0) : v.toFixed(2));
const LAYER_NAMES = { source: "Extract", raw: "Raw / Load", seed: "Seed", staging: "Staging",
  intermediate: "Intermediate", mart: "Mart", serve: "Serve", overview: "Overview" };

/* ============================ ASSET CATALOG ============================ */
/* Each asset = a Dagster-style materialized table/view handed downstream.   */

const ASSETS = [
  /* -------- Yahoo Finance (live) -------- */
  {
    id: "raw.yahoo_chart", group: "yahoo", layer: "source", status: "live",
    name: "raw.yahoo_chart", mat: "API response (JSON)", cadence: "on demand, per ticker",
    dagster: "yahoo/chart", dbt: "source('yahoo','chart')",
    grain: "one JSON document per ticker (arrays of daily bars)",
    why: "The raw pull. A Python tap GETs the chart endpoint; nothing is reshaped yet.",
    desc: "Semi-structured JSON: parallel arrays of epoch timestamps and OHLC values under indicators.quote[0]. Split-adjusted. This is the boundary of the pipeline, everything after is normalization.",
    upstream: [],
    json: `{
  "chart": { "result": [ {
    "meta": { "symbol": "SMCI", "gmtoffset": -14400 },
    "timestamp": [ ..., 1782... ],
    "indicators": { "quote": [ {
      "open":  [ ..., ${E.open} ],
      "high":  [ ..., ${E.high} ],
      "low":   [ ..., ${E.low} ],
      "close": [ ..., ${E.close} ]
    } ] }
  } ] }
}`,
    transforms: [{ tag: "extract", text: "HTTP GET with browser User-Agent; explicit period1/period2 epochs to force daily granularity. Analogous to an Airbyte/dlt source connector." }],
    cardinality: "7 documents per run (one per ticker), each carrying the full daily history.",
  },
  {
    id: "prices", group: "yahoo", layer: "raw", status: "live",
    name: "prices", mat: "table · incremental upsert", cadence: "daily after US close",
    dagster: "yahoo/prices", dbt: ", (landed by the tap)",
    grain: "one row per (ticker, trading date)",
    why: "The raw arrays flattened into rows and persisted. This is what actually lives in oracle.db today.",
    desc: "The JSON arrays are zipped into tabular rows and upserted with INSERT OR REPLACE keyed on (ticker, date), i.e. an incremental load with unique_key=['ticker','date']. Holiday/halt padding (null close) is dropped on the way in.",
    upstream: ["raw.yahoo_chart"],
    schema: [
      { col: "ticker", type: "TEXT", kind: "key", ex: E.ticker, note: "part of the primary key" },
      { col: "date", type: "TEXT", kind: "key", ex: E.date, note: "epoch → local trading date" },
      { col: "open", type: "REAL", kind: "pass", ex: E.open },
      { col: "high", type: "REAL", kind: "pass", ex: E.high },
      { col: "low", type: "REAL", kind: "pass", ex: E.low },
      { col: "close", type: "REAL", kind: "pass", ex: E.close },
    ],
    transforms: [
      { tag: "flatten", text: "zip the parallel timestamp/OHLC arrays into rows" },

/* -------- Then and Now big bang: nine new chains + four roll-ups --------
   The mechanical fields of a standard leaf chain are generated by tnLeafChain;
   every line of prose is authored per metric in the config, so each pipeline
   stays legible without hundreds of lines of boilerplate. Live example values
   come from TN.nodes (computed by the engine at generate time). */
const TNN = TN.nodes || {};
const tnF = v => v == null ? "-" : Math.abs(v) >= 100 ? Math.round(v).toLocaleString() : Math.abs(v) >= 10 ? (+v).toFixed(1) : (+v).toFixed(2);

function tnLeafChain(o) {
  const n = TNN[o.treeKey] || {};
  const P = o.p, g = o.group;
  const chain = [];
  if (o.src) chain.push({
    id: o.src.id, group: g, layer: "source", status: "live",
    name: o.src.id, mat: o.src.mat || "API response (CSV)", cadence: o.src.cadence || "on update",
    dagster: "thennow/" + o.src.id.replace(/^(raw|seed)\./, ""), dbt: o.src.dbt,
    grain: o.src.grain, why: o.src.why, desc: o.src.desc, upstream: [],
    transforms: [{ tag: o.src.seed ? "seed" : "extract", text: o.src.tx }],
    cardinality: o.src.card,
  });
  if (o.raw) chain.push({
    id: o.raw.id, group: g, layer: "raw", status: "live",
    name: o.raw.id, mat: o.raw.mat || "table (fred_series slice)", cadence: o.raw.cadence || "on update",
    dagster: "thennow/" + o.raw.id, dbt: o.raw.id,
    grain: o.raw.grain, why: o.raw.why, desc: o.raw.desc, upstream: o.src ? [o.src.id] : [],
    schema: o.raw.schema,
    transforms: [{ tag: "incremental", text: o.raw.tx || "upsert on (series_id, date)" }],
    tests: ["unique: date", "not_null: " + (o.raw.valCol || "value")],
    cardinality: o.raw.card,
  });
  chain.push({
    id: "stg_" + P + "_filled", group: g, layer: "staging", status: "live",
    name: "stg_" + P + "_filled", mat: "table", cadence: "on generate",
    dagster: "thennow/stg_" + P + "_filled", dbt: "stg_" + P + "_filled",
    grain: "one row per calendar day, per era window",
    why: "A gap-free daily grid so the smoother sees every day; slower cadences step-hold.",
    desc: o.stgDesc || ("Trims to the two declared era windows and forward-fills each published " +
      o.cadence + " value across its days (a step-hold, not interpolation). _grid + _fill."),
    upstream: o.stgUpstream || [o.raw.id],
    schema: [
      { col: "era", type: "STRING", kind: "key", ex: "ai", note: "dotcom | ai" },
      { col: "date", type: "DATE", kind: "key", ex: TN.asOf },
      { col: "value", type: "NUMERIC", kind: "derived", ex: n.rawNow, note: "forward-filled" },
    ],
    transforms: [
      { tag: "trim", text: "to the declared era windows" },
      { tag: "forward-fill", text: "hold each " + o.cadence + " value across its days" },
    ],
    cardinality: `daily; ${TN.dotWk}+${TN.aiWk} weekly points shipped.`,
  }, {
    id: "int_" + P + "_metric", group: g, layer: "intermediate", status: "live",
    name: "int_" + P + "_metric", mat: "table", cadence: "on generate",
    dagster: "thennow/int_" + P + "_metric", dbt: "int_" + P + "_metric",
    grain: "one row per (era, day)",
    why: o.metricWhy || "Applies the declared formula from the metric registry.",
    desc: o.metricDesc,
    upstream: ["stg_" + P + "_filled"],
    schema: [
      { col: "date", type: "DATE", kind: "key", ex: TN.asOf },
      { col: "value", type: "NUMERIC", kind: "derived", ex: n.rawNow, note: o.metricNote },
    ],
    transforms: [{ tag: "formula", text: o.metricTx }],
    cardinality: "1:1 with the daily grid.",
  }, {
    id: "int_" + P + "_smoothed", group: g, layer: "intermediate", status: "live",
    name: "int_" + P + "_smoothed", mat: "table", cadence: "on generate",
    dagster: "thennow/int_" + P + "_smoothed", dbt: "int_" + P + "_smoothed",
    grain: "one row per (era, day)",
    why: "A centered mean so the equivalent point reads cleanly, anchored so intensity=100% lands on the declared peak.",
    desc: "Centered moving average, edge-truncated at today, materialized at both the 90-day '3-month' (default) and 30-day '1-month' windows; the page's Options drawer toggles which one is read. _smooth_centered.",
    upstream: ["int_" + P + "_metric"],
    schema: [
      { col: "date", type: "DATE", kind: "key", ex: TN.asOf },
      { col: "smoothed", type: "NUMERIC", kind: "derived", ex: n.smNow, note: `now; at the declared peak ≈ ${tnF(n.peak)}` },
    ],
    transforms: [{ tag: "smooth", text: "centered 90-day mean (min-periods at the edge)" }],
    tests: ["not_null: smoothed"],
    cardinality: "1:1 with the daily grid.",
  }, {
    id: "int_" + P + "_intensity", group: g, layer: "intermediate", status: "live",
    name: "int_" + P + "_intensity", mat: "table", cadence: "on generate",
    dagster: "thennow/int_" + P + "_intensity", dbt: "int_" + P + "_intensity",
    grain: "one row per (era, day)",
    why: "The shared 0-1 intensity: 0 at the dot-com starting level, 1 at the declared peak.",
    desc: o.ratio
      ? "ratio_from_start: index each era to its own start, then map onto the dot-com range, so inflation and scale drift are normalized away. _normalize."
      : "absolute_level: compare levels directly on the dot-com anchors (this measure means the same thing in any era), so a reading past the 2000 level shows as intensity above 1. _normalize.",
    upstream: ["int_" + P + "_smoothed"],
    schema: [
      { col: "date", type: "DATE", kind: "key", ex: TN.asOf },
      { col: "progress", type: "NUMERIC", kind: "derived", ex: "days ÷ ramp × 100" },
      { col: "intensity", type: "NUMERIC", kind: "derived", ex: n.intensity, note: "0 start, 1 peak" },
    ],
    transforms: [{ tag: "normalize", text: o.ratio ? "growth-since-start over the dot-com range" : "absolute level on the dot-com range" }],
    cardinality: "1:1; weekly-downsampled for the page.",
  }, {
    id: "int_" + P + "_validated", group: g, layer: "intermediate", status: "live",
    name: "int_" + P + "_validated", mat: "table", cadence: "on generate",
    dagster: "thennow/int_" + P + "_validated", dbt: "int_" + P + "_validated",
    grain: "one verdict per metric (+ one row per check)",
    why: "The gate every metric passes through. Only a series that rises, peaks, and falls like the dot-com reference, with AI below that peak and moving toward it, earns a projection; a non-conforming metric is shown as a labeled counter-argument instead.",
    desc: "Two passes over the daily curves: candidacy (covers both eras, real dynamic range) then shape. Emits {valid, checks[], observations}; the verdict and numbers are computed, a cached hash-gated Haiku call writes the prose (deterministic fallback). _validate + observe.refresh_observations.",
    upstream: ["int_" + P + "_intensity"],
    schema: [
      { col: "check", type: "TEXT", kind: "key", ex: "rise, peak, fall" },
      { col: "pass", type: "BOOLEAN", kind: "derived", ex: n.valid, note: `${n.checksPass}/${n.checksN} checks pass → ${n.valid ? "conforms" : "projection suppressed"}` },
      { col: "observations", type: "TEXT", kind: "derived", ex: "Haiku · cached", note: n.obs },
    ],
    transforms: [
      { tag: "validate", text: "candidacy + shape checks → verdict" },
      { tag: "observe", text: "cached, hash-gated Haiku prose (deterministic fallback)" },
    ],
    tests: ["not_null: valid", "accepted_values: valid in (true, false)"],
    cardinality: "1 verdict per metric; gates the projection downstream.",
  }, {
    id: "graph." + o.treeKey, group: g, layer: "serve", status: "live",
    name: "graph: " + o.treeKey, mat: "exposure (JSON)", cadence: "on generate",
    dagster: "thennow (exposure)", dbt: "exposure: " + o.treeKey,
    grain: "one leaf block on thennow.html",
    why: o.graphWhy,
    desc: (o.graphDesc || "Match today's intensity on the dot-com ramp, rate-scale the remainder, ship exact daily scalars plus a weekly series carrying the native value for hover/CSV. _evaluate + _emit.") +
      (n.valid ? "" : " Currently NON-CONFORMING: the date is suppressed and the leaf renders as a counter-argument."),
    upstream: ["int_" + P + "_validated"],
    json: n.valid
      ? `{ "intensityNow": ${n.intensity}, "equivalentDotcomDate": "${n.equiv}",\n  "daysFromPeak": ${n.daysFromPeak}, "projectedPeakDate": "${n.proj}",\n  "display": "${n.display}" }`
      : `{ "intensityNow": ${n.intensity}, "valid": false,\n  "display": "${n.display}", "projectedPeakDate": null }`,
    transforms: [
      { tag: "lookup", text: "value-match on the dot-com ramp → equivalent date" },
      { tag: "rate-scale", text: "remaining distance × AI pace → projected top" },
      { tag: "gate", text: "projection drawn only if the validator conforms" },
    ],
    cardinality: "one leaf node on the Then-and-Now page.",
  });
  return chain;
}

// A branch roll-up group: dimmed foreign inputs → weighted blend → graph.
function tnRollup(o) {
  const n = TNN[o.treeKey] || {};
  return [{
    id: o.blendId, group: o.group, layer: "intermediate", status: "live",
    name: o.blendId, mat: "table", cadence: "on generate",
    dagster: "thennow/" + o.blendId, dbt: o.blendId,
    grain: "one row per (era, day)",
    why: o.blendWhy,
    desc: o.blendDesc + " Only CONFORMING inputs are blended; a non-conforming leaf is shown but never drags the roll-up. Its inputs live in their own pipelines and are shown dimmed here. _blend.",
    upstream: o.inputs,
    schema: [
      { col: "date", type: "DATE", kind: "key", ex: TN.asOf },
      { col: "intensity", type: "NUMERIC", kind: "derived", ex: n.intensity, note: "weighted mean of conforming children" },
    ],
    transforms: [{ tag: "combine", text: "equal-weight mean of the conforming child intensities" }],
    tests: ["not_null: intensity"],
    cardinality: "1:1 on the shared daily grid.",
  }, {
    id: "graph." + o.treeKey, group: o.group, layer: "serve", status: "live",
    name: "graph: " + o.treeKey, mat: "exposure (JSON)", cadence: "on generate",
    dagster: "thennow (exposure)", dbt: "exposure: " + o.treeKey,
    grain: "one roll-up block on thennow.html",
    why: o.graphWhy,
    desc: "The same alignment + projection as a leaf, run on the blended curve." +
      (n.valid ? "" : " Currently NO conforming inputs, so the branch renders as context with its projection suppressed."),
    upstream: [o.blendId],
    json: `{ "intensityNow": ${n.intensity}, "valid": ${n.valid},\n  "projectedPeakDate": ${n.valid ? `"${n.proj}"` : null}, "phase": "${n.phase}" }`,
    transforms: [
      { tag: "lookup", text: "value-match on the blended curve" },
      { tag: "rate-scale", text: "→ branch projected top (suppressed if no inputs conform)" },
    ],
    cardinality: "one roll-up node; feeds the root headline.",
  }];
}

/* Big-bang graphs: straight chains are generated; join and roll-up layouts are
   authored (two or three dimmed inputs feeding the spine). */
function tnVChain(ids, shorts) {
  const nodes = ids.map((id, i) => {
    const last = i === ids.length - 1;
    const n = { id, cx: MX, cy: 30 + i * 60 + (last ? 20 : 0) };
    if (shorts && shorts[id]) n.short = shorts[id];
    return n;
  });
  return {
    viewBox: `0 0 460 ${30 + (ids.length - 1) * 60 + 62}`,
    nodes, spine: ids.slice(1).map((t, i) => [ids[i], t]), curves: [],
  };
}
// Two inputs (own source/raw or dimmed foreign) at the top feeding a chain.
function tnJoin(top, ids, shorts) {
  const nodes = [
    { id: top[0].id, cx: 170, cy: 44, w: 210, foreign: !!top[0].foreign },
    { id: top[1].id, cx: 490, cy: 44, w: 210, foreign: !!top[1].foreign },
  ].concat(ids.map((id, i) => {
    const last = i === ids.length - 1;
    const n = { id, cx: 330, cy: 130 + i * 60 + (last ? 20 : 0) };
    if (shorts && shorts[id]) n.short = shorts[id];
    return n;
  }));
  return {
    viewBox: `0 0 660 ${130 + (ids.length - 1) * 60 + 62}`,
    nodes, spine: ids.slice(1).map((t, i) => [ids[i], t]),
    curves: ["M170,67 C 170,95 285,100 306,107", "M490,67 C 490,95 375,100 354,107"],
  };
}

const FOREIGN_FROM = {
  tn_price: "NASDAQ", tn_sp500: "S&P 500", tn_cape: "CAPE", tn_price_appreciation: "PRICE APPR.",
  tn_buffett: "BUFFETT", tn_tech_leadership: "TECH LEAD", tn_it_invest: "IT INVEST",
  tn_tech_orders: "ORDERS", tn_semis: "SEMIS", tn_margin: "MARGIN", tn_ipo: "IPO",
  tn_curve: "CURVE", tn_sentiment: "SENTIMENT",
};
function buildGraph(groupId) {
  const G = GRAPHS[groupId];
  const byId = Object.fromEntries(G.nodes.map(n => [n.id, n]));
  let edges = "";
  G.spine.forEach(([f, t]) => {
    const a = byId[f], b = byId[t];
    edges += `<path class="gedge" d="M${a.cx},${a.cy + GH / 2} L${b.cx},${b.cy - GH / 2}"/>`;
  });
  G.curves.forEach(d => edges += `<path class="gedge" d="${d}"/>`);
  let nodes = "";
  G.nodes.forEach(n => {
    const a = BY_ID[n.id], w = n.w || GW, x = n.cx - w / 2, y = n.cy - GH / 2;
    const planned = a.status === "planned", foreign = n.foreign;
    const stroke = foreign ? "#333c49" : planned ? "#3a4453" : "#4a5565";
    const dash = (planned || foreign) ? ` stroke-dasharray="4 3"` : "";
    const tcls = (planned || foreign) ? "gtext planned" : "gtext";
    const op = foreign ? ` opacity="0.5"` : "";
    // foreign = an input node that belongs to another metric's pipeline; dim it
    // and label where it comes from. Clicking still jumps to its home graph.
    const lbl = LAYER_NAMES[a.layer].toUpperCase() + (foreign ? " · FROM " + (FOREIGN_FROM[a.group] || a.group.replace("tn_", "").toUpperCase()) : "");
    nodes += `<g class="gnode" data-goto="${n.id}"${op}>
      <rect class="box" x="${x}" y="${y}" width="${w}" height="${GH}" rx="8" fill="#12161f" stroke="${stroke}" stroke-width="1.4"${dash}/>
      <text class="glbl" x="${x + 9}" y="${y + 11}">${lbl}</text>
      <text class="${tcls}" x="${n.cx + 3}" y="${n.cy + 8}" text-anchor="middle">${n.short || a.name}</text>
    </g>`;
  });
  return `<svg viewBox="${G.viewBox}" class="graph" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#55606f"/></marker></defs>
    ${edges}${nodes}</svg>`;
}

function pill(id, cls) {
  const a = BY_ID[id];
  return `<span class="pill ${cls || ''}" data-goto="${id}">${a ? a.name : id}</span>`;
}

// Accordion: at most one source group's step list is expanded at a time.
let expandedGroup = null;

function renderNav() {
  const host = document.getElementById("nav");
  host.innerHTML = "";
  const land = document.createElement("div");
  land.className = "navitem" + (selected === "landing" ? " active" : "");
  land.innerHTML = `<span class="nlabel" style="font-family:var(--font);font-size:13px">Data Source Intro</span>`;
  land.onclick = () => select("landing");
  host.appendChild(land);

  GROUPS.forEach(g => {
    const grp = document.createElement("div");
    grp.className = "navgroup";
    const open = expandedGroup === g.id;
    const gh = document.createElement("div");
    gh.className = "gh" + (selected === "src:" + g.id ? " active" : "");
    gh.innerHTML = `<span class="gcaret">${open ? "▼" : "▶"}</span>` +
      `<span class="gt">${g.name}</span><span class="st ${g.status}">${g.status.toUpperCase()}</span>`;
    gh.querySelector(".gcaret").onclick = e => {
      e.stopPropagation();
      expandedGroup = open ? null : g.id;   // one open at a time
      renderNav();
    };
    gh.onclick = () => { expandedGroup = g.id; select("src:" + g.id); };
    grp.appendChild(gh);
    if (open) {
      // live steps first, planned sorted to the bottom (stable within each)
      ASSETS.filter(a => a.group === g.id)
        .sort((a, b) => (a.status === "planned" ? 1 : 0) - (b.status === "planned" ? 1 : 0))
        .forEach(a => {
          const it = document.createElement("div");
          it.className = "navitem" + (selected === a.id ? " active" : "");
          it.innerHTML = `<span class="ldot"></span><span class="nlabel">${a.name}</span>`;
          it.onclick = () => select(a.id);
          grp.appendChild(it);
        });
    }
    host.appendChild(grp);
  });
}

function schemaTable(a) {
  if (a.json) return `<pre class="sql">${a.json}</pre>`;
  if (!a.schema) return "";
  const rows = a.schema.map(c => `
    <tr>
      <td><span class="col">${c.col}</span>${c.note ? `<div class="note">${c.note}</div>` : ""}</td>
      <td class="typ">${c.type}</td>
      <td><span class="kind ${c.kind}">${c.kind}</span></td>
      <td><span class="ex">${c.ex}</span></td>
    </tr>`).join("");
  const exHead = a.group === "yahoo" ? `Example (${E.ticker} · ${E.date})` : "Example";
  return `<div class="rowcard"><table class="schema">
    <thead><tr><th>Column</th><th>Type</th><th>Origin</th><th>${exHead}</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function detailHtml(a) {

  const downHtml = down.length ? down.map(id => pill(id)).join("") : `<span class="pill none">terminal</span>`;
  const statusCls = a.status === "live" ? "st live" : "st planned";

  return `
    <div class="crumb">${GROUPS.find(g => g.id === a.group).name} · ${LAYER_NAMES[a.layer]}</div>

      <span class="lbadge L-${a.layer}">${LAYER_NAMES[a.layer]}</span>

      <div class="m"><span class="k">Materialization</span><span class="v">${a.mat}</span></div>

      <span class="arrow">→</span>
      <div class="grp"><span class="lbl">this asset</span>${pill(a.id, "self")}</div>
      <span class="arrow">→</span>
      <div class="grp"><span class="lbl">downstream</span><div>${downHtml}</div></div>
    </div>

    <h4>What it is</h4>
    <p class="desc">${a.desc}</p>
    <div class="grain">Grain: <b>${a.grain}</b></div>

    <h4>${a.json ? "Example payload" : "Schema &amp; example row"}</h4>
    ${schemaTable(a)}

    ${a.transforms ? `<h4>Transforms</h4><ul class="xforms">${a.transforms.map(t =>
      `<li><span class="xf">${t.tag}</span>${t.text || ""}${t.macro ? ` <span class="macro">${t.macro}</span>` : ""}</li>`).join("")}</ul>` : ""}

    ${a.sql ? `<h4>Logic</h4><pre class="sql">${a.sql}</pre>` : ""}

    ${a.tests ? `<h4>Tests</h4><div class="tests">${a.tests.map(t => `<span class="t">${t}</span>`).join("")}</div>` : ""}

    ${a.cardinality ? `<h4>Cardinality</h4><p class="desc">${a.cardinality}</p>` : ""}
  `;
}

  }).join("");
  return `
    <div class="crumb">Data Source Intro</div>
    <h1 class="asset" style="font-family:var(--font)">Data Source Intro</h1>
    <p class="why">This section documents the data sources and processing logic behind the oracle, how raw external
      data is pulled and normalized to produce the graphs, evaluate the contract's conditions, and surface the
      ambiguities and options each condition carries. Every source is a chain of Dagster-style assets
      (materialized tables/views handed step to step). Pick a source to see its options, lineage, and per-asset detail.</p>

      <li><span class="xf">origin</span> every schema column is tagged
        <span class="kind key">key</span> <span class="kind pass">pass</span>
        <span class="kind cast">cast</span> <span class="kind derived">derived</span>
        <span class="kind seed">seed</span> <span class="kind meta">meta</span>, so you can see what each step adds vs. carries through.</li>

function sourceOverviewHtml(gid) {
  const grp = GROUPS.find(x => x.id === gid);
  const info = SOURCE_INFO[gid];
  const kind = { opt: "option", clr: "clarified", amb: "ambiguity", cav: "caveat" };
  const section = (title, cls, items) => items.length
    ? `<h5>${title}</h5><ul class="infolist">${items.map(i =>
        `<li class="${cls}"><span class="tag2">${kind[cls]}</span><b>${i.t}</b>, ${i.d}</li>`).join("")}</ul>` : "";
  // cardinality stages map to graph assets, so the table and the graph line up
  const cardRows = info.cardinality.map(r => {
    const stage = r.asset ? `<span class="pill" data-goto="${r.asset}">${BY_ID[r.asset].name}</span>` : `<b>${r.stage}</b>`;
    return `<tr><td class="rc">${r.count}</td><td>${stage}</td><td>${r.meaning}</td></tr>`;
  }).join("");

  let extra = "";
  if (gid === "h100") {
    const tier = DATA.h100[state.h100index];
    extra = `<p class="desc">Current ${state.h100index} reading: <b>$${tier.usd_hr.toFixed(2)}/hr</b>
      (${tier.date}, ${tier.source}), far above the $1.00 trigger. Switch the tier in the sidebar options.</p>`;
  }

  let worked = "";
  if (gid === "yahoo") {
    const close = state.basis === "close";
    const ath = close ? E.athClose : E.athIntraday;
    const dd = close ? E.ddClose : E.ddIntraday;
    const trig = close ? E.triggerClose : E.triggerIntraday;
    const bn = close ? "end-of-day" : "intraday";
    worked = `<h4>The worked example, ${E.ticker}, ${E.date} (${bn} basis)</h4>
       <p class="desc">Follow one condition end to end: ${E.ticker} closed at <b>${money(E.close)}</b>, against its
       ${bn} all-time high of <b>${money(ath)}</b>, a drawdown of <b>${(dd * 100).toFixed(1)}%</b>, at or past the
       50% threshold (trigger <b>${money(trig)}</b>), so <code>met = 1</code>. It is 1 of ${E.supplierTotal} hardware
       suppliers past threshold, which (needing just 1) makes the parent 'supplier collapse' condition MET.
       Switch the basis in the sidebar options to see the numbers change.</p>`;
  }

  return `
    <div class="crumb"><span data-nav="landing" style="cursor:pointer;color:var(--accent)">Data Source Intro</span> &middot; ${grp.name}</div>
    <h1 class="asset" style="font-family:var(--font)">${grp.name}
      <span class="statusbadge st ${grp.status}">${grp.status.toUpperCase()}</span></h1>
    <p class="why">${info.blurb}</p>
    ${extra}

    <h4>Options, clarifications, ambiguities &amp; caveats</h4>
    <div class="infobox">
      ${section("Options", "opt", info.options)}
      ${section("Clarified rules", "clr", info.clarified || [])}
      ${section("Ambiguities", "amb", info.ambiguities)}
      ${section("Caveats", "cav", info.caveats)}
    </div>

    <h4>Asset graph (top → bottom; click any asset)</h4>
    ${buildGraph(gid)}

    <h4>Cardinality, rows at each stage</h4>
    <p class="desc">Cardinality is how many rows a stage holds. Each row below is a stage in the graph above, so you
      can see where the pipeline fans out (a join multiplies rows) and where it collapses
      (aggregation), the shape and cost of the transform, ending in one compact served document.</p>
    <div class="rowcard"><table class="card2">
      <thead><tr><th>Rows</th><th>Stage (asset)</th><th>What it means</th></tr></thead>
      <tbody>${cardRows}</tbody></table></div>

    ${worked}
  `;
}

function select(id) {
  selected = id;
  const host = document.getElementById("detail");
  if (id === "landing") host.innerHTML = landingHtml();
  else if (id.startsWith("src:")) { expandedGroup = id.slice(4); host.innerHTML = sourceOverviewHtml(id.slice(4)); }
  else { const a = BY_ID[id]; if (a) expandedGroup = a.group; host.innerHTML = detailHtml(a); }
  renderNav();
  document.getElementById("scroll").scrollTop = 0;
  if (location.hash.slice(1) !== id) history.replaceState(null, "", "#" + id);
}

document.getElementById("detail").addEventListener("click", e => {
  const src = e.target.closest("[data-src]");
  if (src) return select("src:" + src.getAttribute("data-src"));
  const nav = e.target.closest("[data-nav]");
  if (nav) return select(nav.getAttribute("data-nav"));
  const t = e.target.closest("[data-goto]");
  if (t) select(t.getAttribute("data-goto"));
});

renderOptions();

/* slide-out options drawer */
const drawer = document.getElementById("drawer");
const scrim = document.getElementById("drawer-scrim");
const closeDrawer = () => { drawer.classList.remove("open"); scrim.classList.remove("open"); };
document.getElementById("opts-btn").onclick = () => { drawer.classList.add("open"); scrim.classList.add("open"); };
document.getElementById("drawer-close").onclick = closeDrawer;
scrim.onclick = closeDrawer;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

const initial = location.hash.slice(1);
const validSrc = initial.startsWith("src:") && SOURCE_INFO[initial.slice(4)];
select(BY_ID[initial] ? initial : validSrc ? initial : "landing");
</script>
</body>
</html>
