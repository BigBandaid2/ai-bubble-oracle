name: Daily data update

# Refreshes all data (equity prices, H100 rental proxy), regenerates the
# static site, and commits it. The push to main triggers a Vercel redeploy.
on:
  schedule:
    - cron: "30 22 * * *"   # 22:30 UTC daily (~5:30pm US Eastern, after market close)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write
  issues: write   # candidate-filing alerts

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run daily update (fetch data + regenerate site)
        env:
          # Enables LLM classification of buzz-spike news items. If unset, the
          # pipeline falls back to heuristic scoring — it never hard-fails.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py update

      - name: Commit regenerated site + accumulated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # -A over the generated pages + data dir; oracle.db etc. are gitignored,
          # and this tolerates optional files (e.g. buzz_meta.json) being absent.
          git add -A dashboard.html datasources.html thennow.html data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data update ($(date -u +%Y-%m-%d))"
            # Survive a concurrent push (e.g. a manual fix landing mid-run):
            # rebase onto the remote and retry rather than failing the job.
            pushed=""
            for i in 1 2 3; do
              if git push; then pushed=1; break; fi
              echo "push rejected (attempt $i) — rebasing onto remote and retrying"
              git pull --rebase --autostash origin main || true
            done
            [ -n "$pushed" ] || { echo "::error::could not push after retries"; exit 1; }
          fi

      # If today's docket scan found any Chapter 7/11 candidates, open a GitHub
      # issue (repo watchers get notified by email/app). Deduped: no new issue
      # while one is already open.
      - name: Alert on pending bankruptcy candidates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(date -u +%Y-%m-%d)
          pending=$(awk -F, -v d="$today" 'NR>1 && $1==d && ($3+0)>0 {print $2" ("$3")"}' data/bankruptcy_history.csv | paste -sd ', ' -)
          if [ -z "$pending" ]; then
            echo "No pending candidates."
            exit 0
          fi
          open=$(gh issue list --state open --search "Bankruptcy candidate pending review in:title" --json number --jq 'length' || echo 0)
          if [ "$open" != "0" ]; then
            echo "Alert issue already open; not duplicating."
            exit 0
          fi
          gh issue create \
            --title "⚠️ Bankruptcy candidate pending review: $pending" \
            --body "$(printf 'The daily CourtListener scan found candidate Chapter 7/11 filing(s): **%s**\n\nTo review and confirm:\n1. Check the dashboard card (it shows the candidate count) and the docket on courtlistener.com.\n2. If it is a genuine parent-company bankruptcy, add it to CONFIRMED_BANKRUPTCIES in oracle/config.py, e.g. {"OpenAI": "2026-08-14"} (the filing date).\n3. Commit, then run the "Daily data update" workflow (Actions tab, Run workflow) to regenerate and deploy.\n\nIf it is a false positive (subsidiary, adversary proceeding, name collision), just close this issue - the scan keeps running daily.' "$pending")"
          echo "Alert issue created."

      # A tripped GDELT circuit breaker is a GREEN run, so GitHub's failure email
      # never fires. Alert (via a deduped Issue → email) only on a SUSTAINED
      # throttle; auto-close the issue once GDELT recovers. Never fails the job.
      - name: Alert on sustained GDELT throttling
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          THRESHOLD=3
          streak=$(python -c "import json;print(json.load(open('data/buzz_meta.json')).get('gdelt_throttle_streak',0))" 2>/dev/null || echo 0)
          echo "GDELT consecutive-throttle streak: $streak (alert at $THRESHOLD)"
          num=$(gh issue list --state open --search "GDELT news feed throttled in:title" --json number --jq '.[0].number // empty' || echo "")
          if [ "$streak" -ge "$THRESHOLD" ]; then
            if [ -z "$num" ]; then
              gh issue create \
                --title "⚠️ GDELT news feed throttled ($streak+ days)" \
                --body "$(printf '@BigBandaid2 — the daily update has been unable to reach GDELT for **%s consecutive runs** — the rate-limit circuit breaker keeps tripping. Runs still succeed (all other data updates); only the bankruptcy-buzz news signal is stale.\n\nThis is usually GitHub Actions runner IPs (datacenter ranges) being throttled by GDELT. Options:\n- Wait: transient throttling often clears on its own; this issue auto-closes once a run gets through.\n- If it persists for many days, consider running the GDELT fetch from a non-datacenter host (or a proxy) and committing data/buzz_history.csv + data/buzz_events.csv.\n\nTo investigate: open the latest \"Daily data update\" run logs and search for \"GDELT unavailable\" / \"tripping breaker\".' "$streak")" || echo "issue create failed (non-fatal)"
              echo "Opened GDELT-throttle issue."
            else
              gh issue comment "$num" --body "Still throttled — streak now $streak runs ($(date -u +%Y-%m-%d))." || true
            fi
          elif [ "$streak" = "0" ] && [ -n "$num" ]; then
            gh issue comment "$num" --body "GDELT reachable again — auto-closing." || true
            gh issue close "$num" || true
          fi
          exit 0
