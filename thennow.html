/* ---------- shared constants + tiny date math ---------- */
const DAYMS = 86400000;
const ord = iso => Math.round(Date.parse(iso + "T00:00:00Z") / DAYMS);
const isoFromOrd = n => new Date(n * DAYMS).toISOString().slice(0, 10);
const RAMP = DATA.ramp;
const DOT_START = ord(DATA.dotcomStart), DOT_PEAK = ord(DATA.dotcomPeak);
const AI_START = ord(DATA.aiStart), TODAY = ord(DATA.asOf);
const PROG_DOT = DATA.progDot, PROG_AI = DATA.progAi;
const BOUNDS = DATA.phaseBounds, PHASES = DATA.phases;
const r2 = x => Math.round(x * 100) / 100, r3 = x => Math.round(x * 1000) / 1000;

/* ---------- the analog engine, mirrored from oracle/thennow.py ---------- */
function phaseOf(p) { let l = PHASES[0]; BOUNDS.forEach((e, i) => { if (p >= e) l = PHASES[i]; }); return l; }

function match(target, prog, inten) {
  const ramp = [];
  for (let i = 0; i < prog.length; i++) if (inten[i] != null && prog[i] <= 100) ramp.push([prog[i], inten[i]]);
  if (!ramp.length) return { progress: 0, beyond: false };
  const last = ramp[ramp.length - 1];
  if (target >= last[1]) return { progress: last[0], beyond: target > last[1] };
  if (target <= ramp[0][1]) return { progress: ramp[0][0], beyond: false };
  for (let i = 1; i < ramp.length; i++) {
    const [p0, v0] = ramp[i - 1], [p1, v1] = ramp[i];
    if (v1 === v0) continue;
    if ((v0 - target) * (v1 - target) <= 0) { const f = (target - v0) / (v1 - v0); return { progress: p0 + f * (p1 - p0), beyond: false }; }
  }
  return { progress: last[0], beyond: false };
}

function evaluate(intDot, intAi) {
  let aiNow = 0;
  for (let i = intAi.length - 1; i >= 0; i--) if (intAi[i] != null) { aiNow = intAi[i]; break; }
  const m = match(aiNow, PROG_DOT, intDot), eq = m.progress;
  const equivOrd = DOT_START + Math.round(eq / 100 * RAMP);
  const aiElapsed = TODAY - AI_START;
  const dotDone = Math.max(eq, 0) / 100 * RAMP;
  const ratio = dotDone > 0 ? aiElapsed / dotDone : 1;
  const dotLeft = Math.max(100 - eq, 0) / 100 * RAMP;
  const projOrd = TODAY + Math.round(ratio * dotLeft);
  return {
    intensityNow: r3(aiNow), equivProg: eq, equivalentDotcomDate: isoFromOrd(equivOrd),
    daysFromPeak: equivOrd - DOT_PEAK, compression: r2(ratio),
    projectedPeakDate: isoFromOrd(projOrd), phase: phaseOf(eq), beyondDotcomPeak: m.beyond,
    equiv: { progress: eq, intensity: aiNow }, aiNow: { progress: PROG_AI[PROG_AI.length - 1], intensity: aiNow },
  };
}

function blend(arrays, weights) {
  const n = arrays[0].length, out = [];
  for (let i = 0; i < n; i++) {
    let num = 0, den = 0;
    arrays.forEach((a, k) => { if (a[i] != null) { num += weights[k] * a[i]; den += weights[k]; } });
    out.push(den ? num / den : null);
  }
  return out;
}

/* Recompute a parent (and its ancestors) from live children + current weights. */
function liveKids(node) { return (node.children || []).filter(c => !c.wip && c.intensityDot); }

function recompute(node) {
  const kids = liveKids(node);
  if (!kids.length) return;
  const w = node._weights || kids.map(() => 1);
  node.intensityDot = blend(kids.map(c => c.intensityDot), w);
  node.intensityAi = blend(kids.map(c => c.intensityAi), w);
  Object.assign(node, evaluate(node.intensityDot, node.intensityAi));
}

const PARENT = {};   // childKey -> parent node
(function link(n) { (n.children || []).forEach(c => { PARENT[c.key] = n; link(c); }); })(DATA.tree);

function recomputeUp(node) {
  let cur = PARENT[node.key];
  while (cur) { recompute(cur); redrawNode(cur); cur = PARENT[cur.key]; }
}

/* ---------- rendering ---------- */
const CARDS = {};   // key -> {canvas, node, els}

function fmtDays(d) {
  if (d === 0) return "at the 2000 peak";
  return d < 0 ? `${Math.abs(d)} days before the peak` : `${d} days after the peak`;
}

function nodeCard(node, depth) {
  const el = document.createElement("section");
  el.className = "node depth" + depth + (node.leaf ? " leaf" : "") + (node.wip ? " wip" : "");
  el.id = "card-" + node.key;
  if (node.wip) {
    el.innerHTML = `<div class="nhead"><h2>${node.label}</h2><span class="chip soon">WIP</span>
      <span class="ndate">not wired yet</span></div>
      <div class="nnote">Ingestion and dot-com alignment for this branch arrive in a later phase; it does not affect the projection yet.</div>`;
    return el;
  }
  const tier = node.leaf ? "leaf · " + (node.leaf === "price" ? "Nasdaq index" : "Shiller CAPE") : "roll-up";
  const head = document.createElement("div");
  head.className = "nhead";
  head.innerHTML = `<h2>${node.label}</h2><span class="tier">${tier}</span>
    <span class="chip phase" data-el="phase">${node.phase}</span>
    <span class="ndate">projected top <b data-el="date">${node.projectedPeakDate}</b></span>`;
  el.appendChild(head);

  const body = document.createElement("div");
  body.className = "nbody";
  const cw = document.createElement("div");
  cw.className = "ncw";
  const canvas = document.createElement("canvas");
  cw.appendChild(canvas);
  const legend = document.createElement("div");
  legend.className = "legend";
  legend.innerHTML = `<span><i style="background:var(--ath)"></i>Dot-com path</span>
    <span><i style="background:var(--accent)"></i>AI path (dot-com clock)</span>
    <span><i style="background:var(--trigger)"></i>2000 peak</span>`;
  const left = document.createElement("div");
  left.appendChild(cw); left.appendChild(legend);

  const stat = document.createElement("div");
  stat.className = "nstat";
  stat.innerHTML = statRows(node);
  body.appendChild(left); body.appendChild(stat);
  el.appendChild(body);

  if (node.leaf) {
    const note = document.createElement("div");
    note.className = "nnote";
    note.innerHTML = `<div><span class="k">similar</span>${node.similar}</div>
      <div><span class="k">different</span>${node.different}</div>`;
    el.appendChild(note);
  }

  const kids = liveKids(node);
  if (kids.length >= 2) el.appendChild(weightsBlock(node, kids));

  CARDS[node.key] = { canvas, node, els: {
    phase: head.querySelector('[data-el=phase]'), date: head.querySelector('[data-el=date]'), stat } };

  if (node.children) {
    const wrap = document.createElement("div");
    wrap.className = "kids";
    node.children.forEach(c => wrap.appendChild(nodeCard(c, depth + 1)));
    el.appendChild(wrap);
  }
  return el;
}

function statRows(node) {
  const rows = [
    ["intensity now", `<b>${(node.intensityNow * 100).toFixed(0)}%</b> of the way to the dot-com peak`],
    ["matches dot-com", `<b>${node.equivalentDotcomDate}</b> · ${node.phase}`],
    ["from 2000 peak", fmtDays(node.daysFromPeak)],
    ["pace vs dot-com", `<b>${node.compression}×</b> ${node.compression < 1 ? "(faster)" : "(slower)"}`],
    ["projected top", `<b>${node.projectedPeakDate}</b>`],
  ];
  if (node.display && node.display !== "blended") rows.unshift(["today", node.display]);
  return rows.map(([k, v]) => `<div class="row"><span class="k">${k}</span><span>${v}</span></div>`).join("");
}

function weightsBlock(node, kids) {
  node._weights = node._weights || kids.map(() => 1);
  const box = document.createElement("div");
  box.className = "weights";
  box.innerHTML = `<div class="wl">Weights (how much each child counts toward ${node.label})</div>`;
  kids.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "wrow";
    row.innerHTML = `<label>${c.label}</label>
      <input type="range" min="0" max="100" value="${Math.round(node._weights[i] * 50)}">
      <span class="wv"></span>`;
    const input = row.querySelector("input"), wv = row.querySelector(".wv");
    const sync = () => { const tot = node._weights.reduce((a, b) => a + b, 0) || 1;
      wv.textContent = Math.round(node._weights[i] / tot * 100) + "%"; };
    input.addEventListener("input", () => {
      node._weights[i] = Math.max(0.0001, +input.value / 50);
      recompute(node); redrawNode(node); recomputeUp(node);
      box.querySelectorAll(".wrow").forEach((r, j) => {
        const tot = node._weights.reduce((a, b) => a + b, 0) || 1;
        r.querySelector(".wv").textContent = Math.round(node._weights[j] / tot * 100) + "%";
      });
      refreshHeadline();
    });
    box.appendChild(row); sync();
  });
  return box;
}

function redrawNode(node) {
  const c = CARDS[node.key];
  if (!c) return;
  drawNode(c.canvas, node);
  if (c.els.phase) c.els.phase.textContent = node.phase;
  if (c.els.date) c.els.date.textContent = node.projectedPeakDate;
  if (c.els.stat) c.els.stat.innerHTML = statRows(node);
}

function refreshHeadline() {
  const root = DATA.tree;
  document.getElementById("headline").innerHTML =
    `The AI bubble bursts on <b>${root.projectedPeakDate}</b>`;
  const dates = []; (function walk(n){ if(n.wip) return; if(n.leaf) dates.push(n.projectedPeakDate); (n.children||[]).forEach(walk); })(root);
  const lo = dates.slice().sort()[0], hi = dates.slice().sort()[dates.length - 1];
  document.getElementById("bandrow").innerHTML =
    `<span><span class="k">range</span><b>${lo}</b> to <b>${hi}</b></span>
     <span><span class="k">as of</span><b>${DATA.asOf}</b></span>
     <span><span class="k">metrics live</span><b>1</b> of 4 (valuation)</span>`;
}

/* ---------- canvas: the shared progress-axis renderer ---------- */
const PAD = { l: 36, r: 12, t: 20, b: 18 }, XMAX = 150;
function setup(canvas) {
  const dpr = window.devicePixelRatio || 1, w = canvas.clientWidth || 360, h = canvas.clientHeight || 200;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d"); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, w, h };
}
const xPx = (p, w) => PAD.l + (w - PAD.l - PAD.r) * p / XMAX;
function ticks(min, max, n) {
  const span = max - min || 1, s0 = span / n, mag = Math.pow(10, Math.floor(Math.log10(s0)));
  const step = [1, 2, 2.5, 5, 10].map(m => m * mag).find(s => span / s <= n) || 10 * mag;
  const out = []; for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) out.push(v);
  return out;
}
function line(ctx, xs, ys, x2px, y2px, color, width, dash) {
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash || []); ctx.beginPath();
  let pen = false;
  for (let i = 0; i < xs.length; i++) {
    if (ys[i] == null || xs[i] > XMAX) { pen = false; continue; }
    const x = x2px(xs[i]), y = y2px(ys[i]); pen ? ctx.lineTo(x, y) : ctx.moveTo(x, y); pen = true;
  }
  ctx.stroke(); ctx.setLineDash([]);
}
function mark(ctx, x, y, color) {
  ctx.fillStyle = "#12202e"; ctx.beginPath(); ctx.arc(x, y, 5, 0, 6.2832); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(x, y, 5, 0, 6.2832); ctx.stroke();
}
function drawNode(canvas, node) {
  const { ctx, w, h } = setup(canvas);
  const css = getComputedStyle(document.documentElement);
  const all = node.intensityDot.concat(node.intensityAi).filter(v => v != null);
  const yMax = Math.max(1.15, Math.max(...all) * 1.08), yMin = Math.min(0, Math.min(...all));
  const y2px = v => PAD.t + (h - PAD.t - PAD.b) * (1 - (v - yMin) / (yMax - yMin || 1));
  const x2px = p => xPx(p, w);
  ctx.clearRect(0, 0, w, h);
  ctx.font = "10px 'Segoe UI', sans-serif";
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  for (const t of ticks(yMin, yMax, 4)) {
    const y = y2px(t);
    ctx.strokeStyle = css.getPropertyValue("--border"); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(w - PAD.r, y); ctx.stroke();
    ctx.fillStyle = css.getPropertyValue("--muted"); ctx.fillText((t * 100).toFixed(0) + "%", PAD.l - 5, y);
  }
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  for (let i = 0; i < BOUNDS.length; i++) {
    const lo = BOUNDS[i], hi = i + 1 < BOUNDS.length ? BOUNDS[i + 1] : XMAX;
    if (lo > 0 && lo <= XMAX) {
      const x = x2px(lo);
      ctx.strokeStyle = "#2a3340"; ctx.setLineDash([3, 4]); ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, PAD.t); ctx.lineTo(x, h - PAD.b); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.fillStyle = css.getPropertyValue("--muted2"); ctx.font = "8px 'Segoe UI', sans-serif";
    ctx.fillText(PHASES[i], x2px((Math.min(hi, XMAX) + lo) / 2), 2);
  }
  const xpk = x2px(100);
  ctx.strokeStyle = css.getPropertyValue("--trigger"); ctx.setLineDash([2, 3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xpk, PAD.t); ctx.lineTo(xpk, h - PAD.b); ctx.stroke(); ctx.setLineDash([]);
  line(ctx, PROG_DOT, node.intensityDot, x2px, y2px, css.getPropertyValue("--ath"), 1.4, [5, 3]);
  line(ctx, PROG_AI, node.intensityAi, x2px, y2px, css.getPropertyValue("--accent"), 1.9);
  if (node.equiv && node.aiNow) {
    ctx.strokeStyle = "rgba(153,161,175,.45)"; ctx.setLineDash([2, 3]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x2px(node.equiv.progress), y2px(node.equiv.intensity));
    ctx.lineTo(x2px(node.aiNow.progress), y2px(node.aiNow.intensity)); ctx.stroke(); ctx.setLineDash([]);
    mark(ctx, x2px(node.equiv.progress), y2px(node.equiv.intensity), css.getPropertyValue("--ath"));
    mark(ctx, x2px(node.aiNow.progress), y2px(node.aiNow.intensity), css.getPropertyValue("--accent"));
  }
}

/* ---------- boot ---------- */
document.getElementById("wiptext").innerHTML =
  "Prototype. Not linked from the site nav, not indexed. Method and copy will change.";
document.getElementById("tree").appendChild(nodeCard(DATA.tree, 1));
refreshHeadline();
function fillNotes(id, title, items) {
  const d = document.getElementById(id);
  d.innerHTML = `<summary>${title}</summary><ul>` + items.map(x => `<li>${x}</li>`).join("") + `</ul>`;
}
fillNotes("assumptions", "How this is built", DATA.assumptions);
fillNotes("limitations", "Limitations and notes", DATA.limitations);
function redrawAll() { Object.values(CARDS).forEach(c => drawNode(c.canvas, c.node)); }
requestAnimationFrame(redrawAll);
window.addEventListener("resize", () => requestAnimationFrame(redrawAll));
</script>
</body>
</html>
